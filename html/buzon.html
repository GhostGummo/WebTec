    <form action="../php/guardarQueja.php" method="POST">

      <div class="form-row">
        <div class="field">
          <label for="nombre">Nombres <span class="req">*</span></label>
          <input type="text" id="nombre" name="nombre" placeholder="Nombre completo" required>

              <option value="ing-tics">Ing. en TICS</option>
              <option value="contador">Contador Público</option>
              <option value="buzon">Buzón</option>
            </select>
          </div>
        </div>
      </div>

      <div class="form-row">
        <div class="field">
          <label for="asunto">Asunto</label>
          <input type="text" id="asunto" name="asunto" placeholder="Motivo del mensaje">
        </div>
        <div class="field">
          <label for="telefono">Teléfono / Celular</label>
          <input type="tel" id="telefono" name="telefono" placeholder="288 000 0000">
        </div>
      </div>

      <div class="field">
        <label for="email">Correo electrónico <span class="req">*</span></label>
        <input type="email" id="email" name="email" placeholder="correo@ejemplo.com" required>
      </div>

      <div class="field">
        <label>Tipo de comentario <span class="req">*</span></label>
        <div class="tipo-group">
          <input type="radio" id="tipo-queja" name="tipo" value="queja" required>
          <label for="tipo-queja">⚠ Queja</label>
          <input type="radio" id="tipo-sugerencia" name="tipo" value="sugerencia">
          <label for="tipo-sugerencia">💡 Sugerencia</label>
        </div>
      </div>

      </div>

      <button type="submit" class="btn-submit">Enviar mensaje</button>
